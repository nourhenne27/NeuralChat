<div class="register-page">
  <div class="register-wrap">

    <div class="register-logo">
      <h1>NeuralChat</h1>
      <div class="tagline">RAG-POWERED INTELLIGENCE</div>
    </div>

    <div class="register-card">

      <h2>Créer un compte</h2>
      <p class="card-sub">Rejoignez la plateforme</p>

      <div class="error-banner" *ngIf="error" role="alert">⚠️ {{ error }}</div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

        <div class="form-field">
          <label for="email">EMAIL</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="vous@exemple.com"
            autocomplete="email"
          />
          <span class="field-error" *ngIf="form.get('email')?.touched && emailError">
            {{ emailError }}
          </span>
        </div>

        <div class="form-field">
          <label for="password">MOT DE PASSE</label>
          <div class="password-wrapper">
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="••••••••"
              autocomplete="new-password"
            />
            <button type="button" class="eye-btn" (click)="showPassword = !showPassword">
              👁
            </button>
          </div>
          <span class="field-error" *ngIf="form.get('password')?.touched && passwordError">
            {{ passwordError }}
          </span>
        </div>

        <button type="submit" class="btn-register" [disabled]="isLoading || form.invalid">
          <span *ngIf="!isLoading">Créer mon compte →</span>
          <span *ngIf="isLoading">⏳ Création…</span>
        </button>

      </form>

      <p class="login-link">
        Déjà un compte ? <a routerLink="/auth/login">Se connecter</a>
      </p>

    </div>
  </div>
</div>
