<div class="login-page">
  <div class="login-wrap">

    <div class="login-logo">
      <div class="logo-mark">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="4" fill="currentColor"/>
          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"
                stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>NeuralChat</h1>
      <div class="tagline">RAG-POWERED INTELLIGENCE</div>
    </div>

    <div class="login-card">

      <h2>Connexion</h2>
      <p class="card-sub">Connectez-vous à votre compte</p>

      <div class="error-banner" *ngIf="error" role="alert">⚠️ {{ error }}</div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

        <div class="form-field">
          <label for="email">EMAIL</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="vous@exemple.com"
            autocomplete="email"
          />
          <span class="field-error" *ngIf="form.get('email')?.touched && emailError">
            {{ emailError }}
          </span>
        </div>

        <div class="form-field">
          <label for="password">MOT DE PASSE</label>
          <div class="password-wrapper">
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="••••••••"
              autocomplete="current-password"
            />
            <button type="button" class="eye-btn" (click)="showPassword = !showPassword">
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <span class="field-error" *ngIf="form.get('password')?.touched && passwordError">
            {{ passwordError }}
          </span>
        </div>

        <button type="submit" class="btn-login" [disabled]="isLoading || form.invalid">
          <span *ngIf="!isLoading">Accéder à l'application →</span>
          <span *ngIf="isLoading">⏳ Connexion…</span>
        </button>

      </form>
    </div>

  </div>
</div>
