<div *ngIf="error" class="error-banner">
  {{ error }}
</div>

<table *ngIf="users.length">

  <thead>
    <tr>
      <th>Email</th>
      <th>Rôle</th>
      <th>Créé le</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody>

    <tr *ngFor="let user of users">

      <td>{{ user.email }}</td>

      <td>{{ user.role }}</td>

      <td>{{ user.createdAt | date:'dd/MM/yyyy' }}</td>

      <td>
        <div class="role-cell">
<select
  [ngModel]="user.role"
  [disabled]="loadingRoleUserId === user.id"
  (change)="changeRole(user.id, $any($event.target).value)">
  <option value="User">User</option>
  <option value="Manager">Manager</option>
  <option value="Admin">Admin</option>
</select>
          <span class="role-spinner" *ngIf="loadingRoleUserId === user.id">⏳</span>
        </div>
      </td>

    </tr>

  </tbody>

</table>
