<nav class="navbar" *ngIf="currentUser">
  <div class="navbar-left">
    <div class="page-title" id="navPageTitle">{{ pageTitle }}</div>
  </div>

  <div class="navbar-right">
    <div class="user-pill">

      <!-- Avatar cliquable -->
      <div class="user-avatar" (click)="openFilePicker()" title="Changer la photo">
        <img *ngIf="avatarUrl" [src]="avatarUrl" class="avatar-img" alt="avatar" />
       <span *ngIf="!avatarUrl">{{ currentUser.email[0].toUpperCase() }}</span>
        <div class="avatar-overlay">
          <span *ngIf="!avatarUrl">📷</span>
          <span *ngIf="avatarUrl" class="avatar-overlay-actions">
            <span title="Changer" style="cursor:pointer">📷</span>
            <span title="Supprimer" style="cursor:pointer" (click)="removeAvatar($event)">🗑️</span>
          </span>
        </div>
      </div>

      <!-- Input file caché -->
      <input
        #fileInput
        type="file"
        accept="image/*"
        style="display:none"
        (change)="onFileSelected($event)" />

      <div class="user-info">
        <span class="user-name">{{ currentUser.email }}</span>
        <span class="user-role-tag">{{ currentUser.role }}</span>
      </div>
    </div>

    <button class="logout-btn" (click)="logout()" title="Déconnexion">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3M10 11l3-3-3-3M13 8H6"
          stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</nav>
